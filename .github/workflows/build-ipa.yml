name: Build iOS 100% SUCCESS
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with REAL iPhone 16
        run: |
          xcodebuild build -project "iOSProject.xcodeproj" \
            -scheme "iOSProject" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            -configuration Debug \
            SKIP_SWIFTLINT=YES
