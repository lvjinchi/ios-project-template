name: Build iOS App (No Signing)

on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: ls -la
      - name: Build
        run: xcodebuild build -project "iOSProject.xcodeproj" -scheme "iosProjectTemplate" -destination "platform=iOS Simulator,name=iPhone 15,OS=latest"
