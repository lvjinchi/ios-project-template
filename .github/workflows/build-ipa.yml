name: Build iOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      # 使用 GITHUB_TOKEN 提高 API 速率限制
      GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 选择可用的 Xcode 版本（16.4.0 在列表中）
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4.0'

      # 缓存 Carthage 的构建产物，避免重复下载和编译
      - name: Cache Carthage
        uses: actions/cache@v4
        with:
          path: Carthage/Build
          key: ${{ runner.os }}-carthage-${{ hashFiles('Cartfile.resolved') }}
          restore-keys: |
            ${{ runner.os }}-carthage-

      # 安装 Carthage（运行器通常已预装，但为了确保版本正确）
      - name: Install Carthage
        run: brew install carthage

      # 拉取并构建 Carthage 依赖（使用 --use-xcframeworks 和 --cache-builds）
      - name: Bootstrap Carthage dependencies
        run: carthage bootstrap --platform iOS --use-xcframeworks --cache-builds

      # 可选：列出项目文件，确认 .xcodeproj 存在
      - name: List project files
        run: ls -la

      # 执行 Archive 构建（跳过代码签名）
      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "iOSProject.xcodeproj" \
            -scheme "iOSProject" \
            -destination "generic/platform=iOS" \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
