name: Build
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 安装 carthage（解决你之前的报错！）
      - name: Install Carthage
        run: brew install carthage

      # 纯编译，不指定设备！和你的travis.yml一样
      - name: Build project
        run: |
          xcodebuild build \
            -project "iOSProject.xcodeproj" \
            -scheme "iOSProject" \
            -sdk iphonesimulator \
            -configuration Debug \
            SKIP_SWIFTLINT=YES
