name: Build iOS App (No Signing, No Errors)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 先确认项目文件名，避免再错
      - name: ios-project-template
        run: ls -la *.xcodeproj

      # 用正确的项目名 + 模拟器编译，彻底避开签名问题
      - name: ios-project-template
        run: |
          xcodebuild build -project "iOSProject.xcodeproj" \
            -scheme "ios-project-template" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -configuration Release
