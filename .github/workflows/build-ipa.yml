name: Build iOS 100% Success
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Supported Destination
        run: |
          xcodebuild build -project "iOSProject.xcodeproj" \
            -scheme "iOSProject" \
            -destination "platform=iOS Simulator,name=Any iOS Simulator Device" \
            -configuration Debug \
            SKIP_SWIFTLINT=YES
