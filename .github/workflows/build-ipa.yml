name: Build iOS App Success

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List all files
        run: ls -la

      - name: Build iOS Project (CORRECT NAME)
        run: |
          xcodebuild build -project "iosProjectTemplate.xcodeproj" \
            -scheme "iosProjectTemplate" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -configuration Release
