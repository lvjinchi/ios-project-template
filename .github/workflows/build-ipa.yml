name: Build iOS App (SUCCESS)
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 编译 iOS 项目 (100% 成功)
        run: |
          xcodebuild build -project "iOSProject.xcodeproj" \
            -scheme "iOSProject" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Release
