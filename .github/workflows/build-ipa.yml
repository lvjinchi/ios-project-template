name: Build iOS NO DESTINATION
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build WITHOUT destination
        run: |
          xcodebuild build -project "iOSProject.xcodeproj" \
            -scheme "iOSProject" \
            -configuration Debug \
            SKIP_SWIFTLINT=YES
