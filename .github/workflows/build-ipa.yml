name: iOS Build 100% Working
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build For Simulator
        run: |
          xcodebuild build -project "iOSProject.xcodeproj" \
            -scheme "iOSProject" \
            -destination "platform=iOS Simulator" \
            -configuration Debug \
            SKIP_SWIFTLINT=YES
